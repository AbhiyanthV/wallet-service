version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-walletdb}
      POSTGRES_USER: ${POSTGRES_USER:-wallet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wallet}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wallet} -d ${POSTGRES_DB:-walletdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-walletdb}
      DB_USERNAME: ${POSTGRES_USER:-wallet}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-wallet}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      SERVER_PORT: ${SERVER_PORT:-8080}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
